spring.application.name=ClubSetManagement

# --- REGLAS DE NEGOCIO CLUBSET ---
club.horario.apertura=8
club.horario.cierre=23
club.precio.base=2500.00

# Configuración Dinámica de Base de Datos
# Si existe la variable en Render, la usa. Si no, usa localhost (tu PC).
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/clubset_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1475963}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# CORS: Permitir que Vercel se conecte (ajustaremos esto en el panel de Render)
# Por defecto permitimos todo para facilitar el primer deploy
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET, POST, PUT, DELETE, OPTIONS

# LOGS
logging.level.com.ecommerce.template=INFO
logging.file.name=logs/app.log